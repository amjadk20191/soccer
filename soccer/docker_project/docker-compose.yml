services:
  scraper:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"          # Open http://YOUR_VPS_IP:8080 to see the QR code
    volumes:
      - ./data:/app/data     # persists session file + SQLite DB between restarts
    environment:
      # ── required ──────────────────────────────────────────────────────────
      DATABASE_URL:   ${DATABASE_URL:-sqlite:///data/db.sqlite3}
      DB_TABLE:       ${DB_TABLE:-transactions_transaction}
      # ── optional ──────────────────────────────────────────────────────────
      POLL_INTERVAL:  ${POLL_INTERVAL:-60}
      SESSION_FILE:   ${SESSION_FILE:-data/shamcash_session.json}
      BASE_URL:       ${BASE_URL:-https://shamcash.sy}
      QR_PORT:        ${QR_PORT:-8080}
    # if you use PostgreSQL instead of SQLite, uncomment:
    # depends_on:
    #   - postgres

